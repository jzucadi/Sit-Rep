name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Pick the newest installed Xcode 15.x instead of hardcoding a patch
        # version path that breaks when the runner image is updated.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_15.*.app | sort -V | tail -1)/Contents/Developer"

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug)
        run: |
          xcodebuild clean build \
            -project SysStats.xcodeproj \
            -scheme SysStats \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Tests are intentionally NOT run in CI. The unit tests are app-hosted
      # (TEST_HOST = SysStats.app), so `xcodebuild test` must launch the menu-bar
      # app as the test host. That app runs an indefinite status-bar run loop and
      # never terminates, which hangs the test phase on the runner. Run the suite
      # locally instead: `xcodebuild test -scheme SysStats ...`.
