name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Pick the newest installed Xcode 15.x instead of hardcoding a patch
        # version path that breaks when the runner image is updated.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_15.*.app | sort -V | tail -1)/Contents/Developer"

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build & test (Debug)
        # The SysStatsTests target is hostless (no TEST_HOST) — it compiles the
        # source files under test directly, so `test` does not launch the menu-bar
        # app and cannot hang. Ad-hoc signing is required for the xctest bundle to
        # run on the Apple Silicon runner.
        run: |
          xcodebuild clean test \
            -project SysStats.xcodeproj \
            -scheme SysStats \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Upload test results
        # Only on failure — lets you download the .xcresult to inspect failures.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
